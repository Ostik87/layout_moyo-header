<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <title>MOYO Header</title>

  <!-- Roboto 500 -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="container main-inner">

      <a class="logo" href="#">
        <img src="img/logo.png" alt="Moyo logo">
      </a>

      <nav class="nav">
        <ul class="nav__list">

          <li class="nav__item">
            <a class="nav__link is-active" data-qa="is-active" href="#">Apple</a>
          </li>

          <li class="nav__item">
            <a class="nav__link" href="#">Samsung</a>
          </li>

          <li class="nav__item">
            <a class="nav__link" href="#">Smartphones</a>
          </li>

          <li class="nav__item">
            <a class="nav__link" href="#" data-qa="is-active">Laptops & computers</a>
          </li>

          <li class="nav__item">
            <a class="nav__link" href="#">Gadgets</a>
          </li>

          <li class="nav__item">
            <a class="nav__link" href="#">Tablets</a>
          </li>

          <li class="nav__item">
            <a class="nav__link" href="#">Photo</a>
          </li>

          <li class="nav__item">
            <a class="nav__link" href="#">Video</a>
          </li>

        </ul>
      </nav>

    </div>
  </header>

</body>

</html>
